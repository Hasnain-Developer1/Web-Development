<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background-color: rgba(105, 105, 105, 0.256);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial;
        }

        .box {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 320px;
            padding: 10px;
        }

        .box img {
            width: 100%;
            border-radius: 10px;
        }

        .tags {
            margin-top: 10px;
        }

        .tags span {
            border: 1px solid rgb(91, 84, 84);
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 12px;
            margin-right: 5px;
        }

        h3 {
            margin-top: 15px;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            line-height: 1.4;
        }

        button {
            display: block;
            margin: 15px auto 5px auto;
            border: none;
            border-radius: 50px;
            color: blue;
            background-color: rgb(204, 196, 236);
            padding: 8px 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">

        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">

        <div class="tags">
            <span>Nature</span>
            <span>Lake</span>
        </div>

        <h3>Heading of Para</h3>

        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit voluptatibus nemo non ipsa eveniet
            explicabo.</p>

        <button>Read More</button>

    </div>

</body>

</html>
