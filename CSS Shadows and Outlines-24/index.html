<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 2px 6px 5px blue;
        }
        .shadow{
            text-shadow: 5px 15px 5px red;
            outline: 2px solid black;
            border: 2px solid green;
            border-radius: 30px;
            outline-offset: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
        
    </div>
    <div class="shadow">
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ut, sint omnis. Animi pariatur est vel ducimus, perspiciatis quos exercitationem. Unde recusandae officiis error? Odit placeat quos aliquid molestias animi dolorum.</p>
    </div>
</body>
</html>
