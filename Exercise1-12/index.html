<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- You are given 12 files; 6 videos and 6 Audios.
    Design a website using HTML only which shows these files.
    1.mp3, 2.mp3 ...6.mp3
    1.mp4, 2.mp4 ...6.mp4 -->

    <header style="text-align: center;">This is a website of 6 Videos and 6 Audios</header>
    <main>
        <h3>Audio Files</h3>
        <audio style="display: inline-block;" src="1.mp3" controls preload="auto"></audio>
        <audio style="display: inline-block;" src="2.mp3" controls preload="auto"></audio>
        <audio style="display: inline-block;" src="3.mp3" controls preload="auto"></audio>
        <audio style="display: inline-block;" src="4.mp3" controls preload="auto"></audio>
        <audio style="display: inline-block;" src="5.mp3" controls preload="auto"></audio>
        <audio style="display: inline-block;" src="6.mp3" controls preload="auto"></audio>
        <h3>Videos Files</h3>
        <video style="display: inline-block;" width="49%" height="50%" src="1.mp4" controls preload="auto"></video>
        <video style="display: inline-block;" width="49%" height="50%" src="2.mp4" controls preload="auto"></video>
        <video style="display: inline-block;" width="49%" height="50%" src="3.mp4" controls preload="auto"></video>
        <video style="display: inline-block;" width="49%" height="50%" src="4.mp4" controls preload="auto"></video>
        <video style="display: inline-block;" width="49%" height="50%" src="5.mp4" controls preload="auto"></video>
        <video style="display: inline-block;" width="49%" height="50%" src="6.mp4" controls preload="auto"></video>
    </main>

</body>

</html>
